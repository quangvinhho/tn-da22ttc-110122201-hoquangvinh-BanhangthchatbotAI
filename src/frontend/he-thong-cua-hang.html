<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống cửa hàng - QuangHưng Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="components/header.css">
    <link rel="stylesheet" href="components/ai-chatbot.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f8fafc; }
        .branch-card { transition: all 0.25s ease; }
        .branch-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15); }
        .open-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
        .open-dot.on { background: #16a34a; box-shadow: 0 0 0 4px rgba(22,163,74,.18); animation: pulse 2s infinite; }
        .open-dot.off { background: #9ca3af; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4)} 50%{box-shadow:0 0 0 6px rgba(22,163,74,0)} }
        .service-chip { display: inline-block; padding: 2px 10px; font-size: 12px; border-radius: 9999px; background: #fef2f2; color: #dc2626; margin: 2px 4px 2px 0; }
        iframe.map { width: 100%; height: 220px; border: 0; border-radius: 12px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <!-- Page Header -->
    <section class="bg-gradient-to-r from-red-600 to-red-700 text-white py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-2 text-sm text-white/80 mb-2">
                <a href="index.html" class="hover:text-white"><i class="fas fa-home mr-1"></i>Trang chủ</a>
                <span>/</span>
                <span>Hệ thống cửa hàng</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold">Hệ thống cửa hàng QuangHưng Mobile</h1>
            <p class="mt-2 text-white/90">3 chi nhánh trên toàn quốc — luôn sẵn sàng phục vụ quý khách</p>
        </div>
    </section>

    <!-- Branches list -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div id="branches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- CTA -->
        <div class="mt-10 bg-white rounded-2xl border border-gray-200 p-6 md:p-8 text-center">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">Không tiện đến cửa hàng?</h2>
            <p class="text-gray-600 mb-4">Đặt giữ hàng online — đến chi nhánh gần nhất nhận sản phẩm trong ngày, không thanh toán trước.</p>
            <a href="dat-giu-hang.html" class="inline-block px-6 py-3 bg-red-600 text-white font-semibold rounded-xl hover:bg-red-700 transition">
                <i class="fas fa-store mr-2"></i>Đặt giữ hàng tại cửa hàng
            </a>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script src="js/shop-info.js"></script>
    <script src="components/load-components.js"></script>
    <script>
      // Render branches
      function renderBranches() {
        if (!window.SHOP_INFO) { setTimeout(renderBranches, 100); return; }
        const SI = window.SHOP_INFO;
        const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        const html = SI.BRANCHES.map(b => {
          const st = SI.getStoreStatus(b);
          const services = (b.services || []).map(s => `<span class="service-chip">${esc(s)}</span>`).join('');
          const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(b.address)}`;
          return `
            <div class="branch-card bg-white rounded-2xl border border-gray-200 overflow-hidden">
              <iframe class="map" loading="lazy" src="${esc(b.mapEmbed)}" referrerpolicy="no-referrer-when-downgrade"></iframe>
              <div class="p-5">
                <div class="flex items-start justify-between gap-3 mb-2">
                  <h3 class="text-lg font-bold text-gray-800">${esc(b.name)}</h3>
                  <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-1 rounded-full ${st.open ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">
                    <span class="open-dot ${st.open ? 'on' : 'off'}"></span>
                    ${st.open ? 'Đang mở cửa' : 'Đã đóng'}
                  </span>
                </div>
                <p class="text-sm text-gray-600 mb-2"><i class="fas fa-map-marker-alt text-red-500 w-4"></i> ${esc(b.address)}</p>
                <p class="text-sm text-gray-600 mb-2"><i class="fas fa-phone-alt text-red-500 w-4"></i> <a href="tel:${esc(b.phone)}" class="hover:underline">${esc(b.phone)}</a></p>
                <p class="text-sm text-gray-600 mb-2"><i class="far fa-envelope text-red-500 w-4"></i> <a href="mailto:${esc(b.email)}" class="hover:underline">${esc(b.email)}</a></p>
                <p class="text-sm text-gray-500 mb-3"><i class="far fa-clock text-red-500 w-4"></i> T2-T7: 08:00-21:00 &middot; CN: 08:00-20:00</p>
                <div class="mb-3">${services}</div>
                <div class="grid grid-cols-2 gap-2">
                  <a href="${dirUrl}" target="_blank" class="text-center px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white text-sm font-medium rounded-lg">
                    <i class="fas fa-directions mr-1"></i>Chỉ đường
                  </a>
                  <a href="dat-giu-hang.html?branch=${encodeURIComponent(b.id)}" class="text-center px-3 py-2 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-lg">
                    <i class="fas fa-store mr-1"></i>Đặt giữ hàng
                  </a>
                </div>
              </div>
            </div>`;
        }).join('');
        document.getElementById('branches-grid').innerHTML = html;
      }
      renderBranches();
    </script>
    <script src="main.js"></script>
    <script src="components/ai-chatbot.js"></script>
</body>
</html>
